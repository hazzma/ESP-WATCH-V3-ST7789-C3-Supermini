[env:esp32c3]
platform = espressif32@6.4.0
board = esp32-c3-devkitm-1
framework = arduino

; Serial Monitor setup for debugging
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
upload_port = COM3

build_flags =
    -I include
    ; CORE & DEBUGGING FLAGS
    -D CORE_DEBUG_LEVEL=3       ; Info level for Serial output
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1 ; Allow Serial Monitor via Native USB
    
    ; TFT_eSPI CONFIGURATION (Dynamic Injection, DO NOT edit User_Setup.h)
    -D USER_SETUP_LOADED=1
    -D ST7789_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=280
    -D TFT_RGB_ORDER=TFT_RGB
    -D TFT_MISO=-1
    -D TFT_MOSI=6
    -D TFT_SCLK=4
    -D TFT_CS=-1
    -D TFT_DC=2
    -D TFT_RST=1
    -D TFT_BL=10
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_FONT6=1
    -D LOAD_FONT7=1
    -D LOAD_FONT8=1
    -D SPI_FREQUENCY=40000000

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.31
    oxullo/MAX30100lib @ ^1.2.1